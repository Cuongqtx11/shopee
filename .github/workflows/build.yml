name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Build iOS (Archive)
        run: |
          cd ios/App
          xcodebuild -scheme App -configuration Release -archivePath $PWD/build/App.xcarchive archive

      - name: Export IPA
        run: |
          cd ios/App/build
          mkdir export
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportPath export \
            -exportOptionsPlist ../../exportOptions.plist || true

      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: P12-IPA
          path: ios/App/build/export/**/*.ipa
